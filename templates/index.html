<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uber Demand Analyzer</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>   
</head>

<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i class="fa-solid fa-car-side"></i>
                    <h1>UBER<span>DEMAND</span></h1>
                </div>
                
                <div class="theme-switch-wrapper">
                    <i class="fa-solid fa-sun"></i>
                    <label class="theme-switch" for="checkbox">
                        <input type="checkbox" id="checkbox" />
                        <div class="slider round"></div>
                    </label>
                    <i class="fa-solid fa-moon"></i>
                </div>
            </div>
            
            <form id="predict-form">
                <div class="input-group autocomplete-container">
                    <label>Starting Location</label>
                    <input type="text" id="location" placeholder="Search NYC neighborhood..." autocomplete="off" required>
                    <div id="autocomplete-list" class="autocomplete-items hidden"></div>
                </div>

                <div class="input-group">
                    <label>Pickup Time</label>
                    <div class="digital-clock-container">
                        <div class="clock-control">
                            <button type="button" class="time-btn" id="hour-up"><i class="fa-solid fa-chevron-up"></i></button>
                            <div class="time-display">
                                <span id="display-hour">12</span>
                                <span class="colon">:</span>
                                <span id="display-min">00</span>
                            </div>
                            <button type="button" class="time-btn" id="hour-down"><i class="fa-solid fa-chevron-down"></i></button>
                        </div>
                        
                        <div class="ampm-toggle">
                            <button type="button" id="toggle-am" class="active">AM</button>
                            <button type="button" id="toggle-pm">PM</button>
                        </div>
                    </div>
                    <input type="hidden" id="hour" value="0">
                </div>

                <div class="input-group">
                    <label>Weekday</label>
                    <select id="weekday">
                        <option value="0">Monday</option>
                        <option value="1">Tuesday</option>
                        <option value="2">Wednesday</option>
                        <option value="3">Thursday</option>
                        <option value="4">Friday</option>
                        <option value="5">Saturday</option>
                        <option value="6">Sunday</option>
                    </select>
                </div>

                <button type="submit" id="submit-btn">Analyze Demand</button>
            </form>
        </aside>

        <main class="dashboard">
            <div id="welcome-msg">
                <i class="fa-solid fa-map-location-dot"></i>
                <h2>Ready for the next shift?</h2>
                <p>Enter your location to find the highest demand hotspots in NYC.</p>
            </div>

            <div id="map" class="hidden"></div>

            <div id="results-container" class="hidden">
                <div class="stats-grid">
                    <div class="card surge-card">
                        <h3>Surge Level</h3>
                        <div class="badge" id="res-level">LOW</div>
                        <div class="value"><span id="res-surge">1.0</span>x</div>
                    </div>

                    <div class="card">
                        <h3>Your Current Zone</h3>
                        <p id="res-zone" class="zone-name">--</p>
                        <div class="sub-stat">
                            <span class="label">Nearby Rides:</span>
                            <span id="res-current-rides" class="val">0</span>
                        </div>
                    </div>
                </div>

                <div class="card highlight-card">
                    <div class="card-header">
                        <i class="fa-solid fa-star"></i>
                        <h3>Recommended Hotspot</h3>
                    </div>
                    <div class="recommendation-content">
                        <h2 id="res-best-hotspot">--</h2>
                        <div class="recommendation-details">
                            <div class="detail-item">
                                <i class="fa-solid fa-route"></i>
                                <span id="res-distance">0.0</span> km away
                            </div>
                            <div class="detail-item">
                                <i class="fa-solid fa-users"></i>
                                <span id="res-hotspot-rides">0</span> estimated rides
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div id="loader" class="hidden">
                <div class="spinner"></div>
                <p>Consulting the algorithm...</p>
            </div>
        </main>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
